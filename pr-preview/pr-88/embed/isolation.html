<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Style isolation demo — ODL/OEPL Drawcustom Designer</title>
    <style>
      /* Deliberately HOSTILE host styling (issue #21): a worst-case host page
         that screams `!important` at everything and squats on Tailwind-ish
         utility class names. None of it may reach into the designer's shadow
         root — and nothing from the designer may restyle this page. */
      * {
        color: rgb(255, 0, 0) !important;
        font-family: 'Comic Sans MS', cursive !important;
        letter-spacing: 4px !important;
      }
      body {
        margin: 0;
        background: #fdf6b2;
      }
      /* Colliding utility class names, hostile definitions. */
      .flex {
        display: block !important;
        border: 5px dotted lime !important;
      }
      .p-4 {
        padding: 0 !important;
      }
      .dark {
        filter: invert(1) !important;
      }
      .designer-slot {
        height: 45vh;
        margin: 1rem;
        border: 2px dashed #a8a29e;
      }
    </style>
  </head>
  <body>
    <h1 id="host-heading">Hostile host page</h1>
    <p id="host-probe" class="flex p-4">
      Host element squatting on Tailwind class names — the designer must not restyle me.
    </p>
    <div id="designer-light" class="designer-slot"></div>
    <div id="designer-dark" class="designer-slot"></div>
    <script type="module" src="./isolation.js"></script>
  </body>
</html>
