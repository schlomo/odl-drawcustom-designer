<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embed demo — ODL/OEPL Drawcustom Designer</title>
    <style>
      /* Deliberately plain host-page styling: this page stands in for a host
         application (e.g. a Home Assistant panel) embedding the designer. */
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #ece7df;
        color: #1c1917;
      }
      header.host {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 1rem;
        background: #292524;
        color: #fafaf9;
        flex-wrap: wrap;
      }
      header.host h1 {
        font-size: 1rem;
        margin: 0 auto 0 0;
      }
      header.host button,
      header.host select {
        font: inherit;
        padding: 0.25rem 0.75rem;
      }
      #designer {
        height: 85vh;
        margin: 1rem;
        border: 2px dashed #a8a29e;
      }
      #saved-payload {
        margin: 1rem;
        padding: 0.75rem;
        background: #fafaf9;
        border: 1px solid #a8a29e;
        min-height: 3rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header class="host">
      <h1>Fake host page (embed demo)</h1>
      <button id="push-warm">Push warm states</button>
      <button id="push-cold">Push cold states</button>
      <button id="push-capabilities">Push 296×128 BWR display</button>
      <select id="theme" aria-label="Host theme">
        <option value="light">light</option>
        <option value="dark">dark</option>
      </select>
      <button id="destroy">Destroy</button>
    </header>
    <div id="designer"></div>
    <h2 style="margin: 1rem">Last saved payload</h2>
    <pre id="saved-payload" data-testid="saved-payload">(nothing saved yet)</pre>
    <script type="module" src="./host.js"></script>
  </body>
</html>
